<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Observatory | Radar Pro</title>
    <link rel="icon" type="image/svg+xml" href="/opensource-radar/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col antialiased">

    <header class="sticky top-0 z-50" style="border-bottom:1px solid rgba(38,48,67,0.5)">
        <div class="bg-[#080B12]/80 backdrop-blur-xl">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
                <div class="flex items-center gap-2.5">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="url(#radarGrad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <defs><linearGradient id="radarGrad" x1="0" y1="0" x2="24" y2="24"><stop offset="0%" stop-color="#58a6ff"/><stop offset="100%" stop-color="#8B5CF6"/></linearGradient></defs>
                        <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/>
                        <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
                        <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
                    </svg>
                    <span class="text-lg font-bold bg-gradient-to-r from-blue-400 to-violet-500 bg-clip-text text-transparent tracking-tight">radar</span>
                    <span class="text-[0.6rem] uppercase tracking-widest text-blue-400 font-medium px-1.5 py-0.5 rounded-full border border-blue-500/30" style="box-shadow:0 0 8px rgba(31,111,235,0.15)">Pro</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="flex items-center gap-1.5 text-[10px] uppercase tracking-widest text-blue-400/70 font-medium"><span class="neon-dot"></span>Live Signal</span>
                    <span id="headerResultCount" class="text-xs text-slate-500"></span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-5">

        <section class="glass rounded-2xl p-4 sm:p-5 mb-4">
            <div class="flex items-center gap-2 sm:gap-3">
                <div class="relative flex-1">
                    <svg class="search-icon absolute left-3 top-1/2 -translate-y-1/2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input id="topic" type="text" placeholder="Search by topic or keyword…" value="TUI" class="filter-input w-full pl-10 pr-3 h-10 text-sm">
                </div>
                <button id="searchBtn" class="btn-primary h-10 px-5 text-sm shrink-0">Search</button>
            </div>

            <div class="mt-3 flex items-center justify-between gap-2">
                <div class="flex items-center gap-2 text-xs text-slate-500 min-w-0">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
                    <span id="filterSummary" class="truncate">★ 10–1k · 30d · All</span>
                </div>
                <button id="filterToggleBtn" class="text-xs font-medium text-slate-500 hover:text-slate-300 transition flex items-center gap-1.5 shrink-0 md:hidden">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/></svg>
                    Filters
                </button>
            </div>

            <div id="filterPanel" class="filter-panel md:!max-h-none md:!opacity-100">
                <div class="mt-4 pt-4 border-t border-[#263043]/50 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">

                    <div class="sm:col-span-2 lg:col-span-1">
                        <div class="filter-label">Stars</div>
                        <div class="flex items-center gap-2">
                            <input id="starsFrom" type="number" min="0" max="1000000" value="10" class="filter-input w-full text-center text-sm">
                            <span class="text-slate-600 text-xs shrink-0">—</span>
                            <input id="starsTo" type="number" min="0" max="1000000" value="1000" class="filter-input w-full text-center text-sm">
                        </div>
                    </div>

                    <div class="sm:col-span-2 lg:col-span-1">
                        <div class="filter-label">Created</div>
                        <div class="flex items-center gap-2">
                            <input id="days" type="range" min="7" max="365" value="30" class="w-full h-1.5">
                            <span id="daysVal" class="text-xs font-mono text-slate-300 w-8 text-right shrink-0">30</span>
                        </div>
                        <div id="depthPresets" class="flex flex-wrap gap-1.5 mt-1.5">
                            <button class="depth-preset" data-days="7">7d</button>
                            <button class="depth-preset" data-days="14">14d</button>
                            <button class="depth-preset active" data-days="30">30d</button>
                            <button class="depth-preset" data-days="90">90d</button>
                            <button class="depth-preset" data-days="365">1y</button>
                        </div>
                    </div>

                    <div>
                        <div class="filter-label">Language</div>
                        <select id="language" class="filter-input text-sm">
                            <option value="">All</option>
                        </select>
                    </div>

                    <div>
                        <div class="filter-label">Sort</div>
                        <div class="flex items-center gap-2">
                            <select id="sort" class="filter-input text-sm flex-1">
                                <option value="stars">Stars</option>
                                <option value="updated">Recent</option>
                                <option value="name">Name</option>
                            </select>
                            <button id="orderBtn" class="order-btn" title="Toggle order">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
                            </button>
                        </div>
                    </div>

                    <div>
                        <div class="filter-label">Per page</div>
                        <div class="flex items-center gap-2">
                            <select id="perPage" class="filter-input text-sm">
                                <option value="10">10</option>
                                <option value="25" selected>25</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>
                            <button id="resetFiltersBtn" class="btn-ghost text-xs px-2.5 py-1.5 shrink-0" title="Reset all filters">↺</button>
                        </div>
                    </div>

                </div>

                <div id="filterChips" class="flex flex-wrap items-center gap-1.5 mt-3 min-h-[22px]"></div>
            </div>
        </section>

        <div id="viewToggleBar" class="hidden md:flex items-center justify-between mb-3">
            <span id="viewResultCount" class="text-xs text-[#8d96a0]"></span>
            <div class="flex items-center gap-1 p-1 rounded-xl bg-[#161b22] border border-[#30363d]">
                <button id="btn-grid" class="view-btn active" title="Cards">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1"/>
                        <rect x="9" y="1.5" width="5.5" height="5.5" rx="1"/>
                        <rect x="1.5" y="9" width="5.5" height="5.5" rx="1"/>
                        <rect x="9" y="9" width="5.5" height="5.5" rx="1"/>
                    </svg>
                </button>

                <button id="btn-list" class="view-btn" title="Table">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="2" y1="3.5" x2="14" y2="3.5"/>
                        <line x1="2" y1="8" x2="14" y2="8"/>
                        <line x1="2" y1="12.5" x2="14" y2="12.5"/>
                    </svg>
                </button>
            </div>
        </div>

        <div id="results" class="card-grid results-container"></div>

        <div id="pagination" class="flex items-center justify-center gap-4 mt-8 pt-6 border-t border-[#263043]/50 hidden">
            <button data-delta="-1" class="px-4 py-2 rounded-xl glass text-sm font-medium hover:border-blue-500/30 transition-all" style="border-color:rgba(38,48,67,0.6)">← Back</button>
            <span id="pageInfo" class="self-center text-sm font-mono text-slate-500">1</span>
            <button data-delta="1" class="px-4 py-2 rounded-xl glass text-sm font-medium hover:border-blue-500/30 transition-all" style="border-color:rgba(38,48,67,0.6)">Next →</button>
        </div>
    </main>

    <footer class="mt-auto" style="border-top:1px solid rgba(38,48,67,0.5)">
        <div class="bg-[#080B12]/60 backdrop-blur-xl">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-slate-600">
                <div class="flex items-center gap-3">
                    <span class="font-semibold text-slate-500">Neon Observatory</span>
                    <span class="hidden sm:inline">·</span>
                    <span class="hidden sm:inline">Tracking Open Source signals</span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="https://github.com" target="_blank" rel="noopener" class="hover:text-slate-400 transition flex items-center gap-1.5">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                        GitHub
                    </a>
                    <span>·</span>
                    <span>2026</span>
                </div>
            </div>
        </div>
    </footer>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
